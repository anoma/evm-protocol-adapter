# Full reference https://github.com/foundry-rs/foundry/tree/master/crates/config
[profile.default]
fs_permissions = [{ access = "read", path = "./" }]


# Deterministic deployment settings (https://book.getfoundry.sh/guides/deterministic-deployments-using-create2#configuring-your-foundrytoml)
cbor_metadata = false
bytecode_hash = "none"

solc = "0.8.30"
auto_detect_solc = false
evm_version = "prague"
gas_reports = [
    "ProtocolAdapter",
    "CommitmentTreeMock",
    "NullifierSetMock",
    "BlockTimeForwarder",
]
optimizer = true
via_ir = true
optimizer_runs = 10_000
allow_internal_expect_revert = true

auto_detect_remappings = false

remappings = [
    "forge-std/=dependencies/forge-std-1.12.0/src/",
    "@openzeppelin-contracts/=dependencies/@openzeppelin-contracts-5.5.0/",
    "openzeppelin/contracts/=dependencies/@openzeppelin-contracts-5.5.0/",
    "@risc0-ethereum/=dependencies/risc0-ethereum-3.0.1/contracts/src/",
    "@elliptic-curve-solidity/=dependencies/elliptic-curve-solidity-0.2.5/",
    "@solady/=dependencies/solady-0.1.26/src/",
]
libs = ["dependencies"]

[dependencies]
"forge-std" = "1.12.0"
"@openzeppelin-contracts" = "5.5.0"
"solady" = "0.1.26"
risc0-risc0-ethereum = "3.0.1"
"elliptic-curve-solidity" = { version = "0.2.5", git = "https://github.com/witnet/elliptic-curve-solidity", rev = "347547890840fd501809dfe0b855206407136ec0" }

[soldeer]
recursive_deps = true
remappings_generate = false
remappings_regenerate = true
remappings_version = false
remappings_prefix = ""

[fuzz]
runs = 1_000

[profile.ci]
fuzz = { runs = 1_000 }
verbosity = 3

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ETHERSCAN_API_KEY}" }
arbitrum-sepolia = { key = "${ETHERSCAN_API_KEY}" }
optimism = { key = "${ETHERSCAN_API_KEY}" }
optimism-sepolia = { key = "${ETHERSCAN_API_KEY}" }
base = { key = "${ETHERSCAN_API_KEY}" }
base-sepolia = { key = "${ETHERSCAN_API_KEY}" }

[rpc_endpoints]
mainnet = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
arbitrum = "https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
arbitrum-sepolia = "https://arb-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
base = "https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
base-sepolia = "https://base-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
optimism = "https://opt-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
optimism-sepolia = "https://opt-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

localhost = "http://localhost:8545"
